<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patxanga v2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>
    <main class="page">
      <noscript>
        <div class="card error">
          Activa JavaScript para ver el contenido dinámico del QR.
        </div>
      </noscript>
      <article class="card">
        <header>
          <p class="eyebrow">Patxanga Team</p>
          <h1 id="campaign-title">Cargando contenido</h1>
          <p id="campaign-description" class="description">
            Estamos preparando la configuración del día para ti.
          </p>
          <p id="item-description" class="item-description">
            Cargando descripción del contenido activo.
          </p>
        </header>
        
        <div id="media-container" class="media-container" aria-live="polite">
          <div class="loader" id="loader"></div>
        </div>
        
        <footer class="meta">
          <div>
            <dt>Fecha de hoy</dt>
            <dd id="effective-date">...</dd>
          </div>
          <div>
            <dt>Contenido Activo</dt>
            <dd id="content-name">...</dd>
          </div>
        </footer>

        <aside class="visit-counter" aria-label="Contador de visitas">
          <div class="visit-counter-top">
            <div class="visit-counter-stats">
              <span class="visit-counter-label">Visitas realizadas</span>
              <img
                class="visit-counter-badge"
                src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fchispasgg.github.io%2Fpatxangav2%2F&label=&icon=award&color=%2313ff00&message=&style=plastic&tz=UTC"
                alt="Contador de visitas"
              />
            </div>
            <button id="random-phrase-button" class="phrase-button" type="button">
              Frase aleatoria
            </button>
          </div>
          <p id="random-phrase-message" class="phrase-message" hidden></p>
        </aside>
        
        <p id="error-message" class="error" hidden></p>
      </article>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
