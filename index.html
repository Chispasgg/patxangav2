<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>patxangav2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">QR rotativo</p>
        <h1 id="campaign-title">Cargando contenido</h1>
        <p id="campaign-description" class="description">
          Espera mientras cargamos la configuración.
        </p>
        <div id="media-container" class="media-container" aria-live="polite"></div>
        <dl class="meta">
          <div>
            <dt>Fecha efectiva</dt>
            <dd id="effective-date">-</dd>
          </div>
          <div>
            <dt>Contenido activo</dt>
            <dd id="content-name">-</dd>
          </div>
        </dl>
        <p id="error-message" class="error" hidden></p>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
