<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patxanga v2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>
    <main class="page">
      <noscript>
        <div class="card error">
          Activa JavaScript para ver el contenido dinámico del QR.
        </div>
      </noscript>
      <article class="card">
        <header>
          <p class="eyebrow">Patxanga Team</p>
          <h1 id="campaign-title">Cargando contenido</h1>
          <p id="campaign-description" class="description">
            Estamos preparando la configuración del día para ti.
          </p>
          <p id="item-description" class="item-description">
            Cargando descripción del contenido activo.
          </p>
        </header>
        
        <div id="media-container" class="media-container" aria-live="polite">
          <div class="loader" id="loader"></div>
        </div>
        
        <footer class="meta">
          <div>
            <dt>Fecha de hoy</dt>
            <dd id="effective-date">...</dd>
          </div>
          <div>
            <dt>Contenido Activo</dt>
            <dd id="content-name">...</dd>
          </div>
        </footer>
        
        <p id="error-message" class="error" hidden></p>
      </article>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
